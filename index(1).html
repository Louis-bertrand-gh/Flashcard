<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flashcards — Révisions BTS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0f18;}
:root{
  --bg:#0d0f18;
  --surface:#161924;
  --surface2:#1f2335;
  --border:#292d45;
  --text:#e8e9f0;
  --muted:#626880;
  --accent:#7c6af7;
  --c-red:#ff5c5c; --c-red-bg:rgba(255,92,92,.12);
  --c-orange:#ff9f43; --c-orange-bg:rgba(255,159,67,.12);
  --c-blue:#5bb5ff; --c-blue-bg:rgba(91,181,255,.12);
  --c-green:#44d9a0; --c-green-bg:rgba(68,217,160,.12);
}
body{font-family:'DM Sans',sans-serif;color:var(--text);}

/* ═══════════════════════ HOME ═══════════════════════ */
#home{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100dvh;padding:24px;gap:0;
}
.home-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2rem,6vw,3.2rem);
  color:var(--text);text-align:center;line-height:1.1;margin-bottom:8px;
}
.home-sub{font-size:.85rem;color:var(--muted);margin-bottom:40px;text-align:center;}
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:540px;}
.subject-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:28px 20px;cursor:pointer;text-align:center;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.subject-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.subject-card.cejm:hover{border-color:#7c6af7;}
.subject-card.francais:hover{border-color:#44d9a0;}
.subject-icon{font-size:2.6rem;line-height:1;}
.subject-name{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);}
.subject-count{font-size:.72rem;color:var(--muted);}
.subject-pill{
  font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 10px;border-radius:99px;margin-top:2px;
}
.pill-cejm{background:rgba(124,106,247,.18);color:#a99df8;}
.pill-fr{background:rgba(68,217,160,.18);color:#44d9a0;}

/* ═══════════════════════ APP ═══════════════════════ */
#app{display:none;flex-direction:column;height:100dvh;}
#app.visible{display:flex;}

.topbar{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 6px;gap:10px;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;padding:5px 10px;font-size:.72rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:color .15s;white-space:nowrap;
}
.back-btn:hover{color:var(--text);}
.title-block h1{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);line-height:1;}
.title-block p{font-size:.68rem;color:var(--muted);margin-top:1px;}
.counter{font-size:.72rem;color:var(--muted);white-space:nowrap;}
.counter strong{color:var(--text);}

.prog-wrap{flex:0 0 auto;padding:0 14px 5px;}
.prog-bar{height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease;}
.prog-cejm{background:linear-gradient(90deg,var(--accent),var(--c-blue));}
.prog-fr{background:linear-gradient(90deg,var(--c-green),#5eead4);}

.tabs{
  flex:0 0 auto;display:flex;gap:5px;padding:0 14px 5px;
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex:0 0 auto;font-size:.68rem;font-weight:500;padding:4px 11px;border-radius:99px;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;
}
.tab.active{color:#fff;border-color:transparent;}
.tab-active-cejm{background:var(--accent);}
.tab-active-fr{background:#16a082;}

.scene{
  flex:1 1 0;min-height:0;padding:0 14px;perspective:1200px;
  display:flex;align-items:stretch;
}
.card{
  width:100%;position:relative;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,.2,.2,1);cursor:pointer;
}
.card.flipped{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;border-radius:16px;border:1px solid var(--border);
  backface-visibility:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:14px 20px;
  text-align:center;gap:7px;overflow:hidden;
}
.front{background:var(--surface);}
.back{background:var(--surface2);transform:rotateY(180deg);}

.badge{font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:99px;}

/* CEJM badge colors */
.b-eco{background:rgba(91,181,255,.15);color:#5bb5ff;}
.b-droit{background:rgba(255,92,92,.15);color:#ff7f7f;}
.b-mgt{background:rgba(124,106,247,.18);color:#a99df8;}

/* Français badge colors */
.b-imaginer{background:rgba(124,106,247,.18);color:#a99df8;}
.b-connaitre{background:rgba(68,217,160,.15);color:#44d9a0;}
.b-comprendre{background:rgba(255,159,67,.15);color:#ffb865;}
.b-oeuvres{background:rgba(255,92,92,.15);color:#ff7f7f;}

/* CEJM auteurs */
.b-auteurs{background:rgba(236,72,153,.15);color:#ec4899;}

.card-word{font-family:'DM Serif Display',serif;font-size:clamp(1.2rem,4.5vw,1.9rem);color:var(--text);line-height:1.15;}
.card-author{font-size:.7rem;color:var(--accent);font-style:italic;margin-top:-3px;}
.card-chap{font-size:.62rem;color:var(--muted);}
.card-tap{font-size:.65rem;color:var(--muted);}
.card-def{font-size:clamp(.75rem,2.1vw,.9rem);line-height:1.58;color:var(--text);max-width:500px;}
.card-ex{font-size:.72rem;color:var(--muted);font-style:italic;line-height:1.5;border-top:1px solid var(--border);padding-top:7px;width:100%;}
.card-status{position:absolute;top:10px;right:12px;font-size:.58rem;font-weight:600;padding:2px 8px;border-radius:99px;}

.dots{flex:0 0 auto;display:flex;justify-content:center;gap:4px;padding:5px 14px 2px;flex-wrap:wrap;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .25s;}
.dot.cur{width:18px;border-radius:99px;}
.dot-cur-cejm{background:var(--accent);}
.dot-cur-fr{background:#16a082;}
.dot.s0{background:var(--c-red);}
.dot.s1{background:var(--c-orange);}
.dot.s2{background:var(--c-blue);}
.dot.s3{background:var(--c-green);}

.actions{flex:0 0 auto;padding:5px 10px 6px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;}
.act-btn{
  border:none;border-radius:11px;padding:8px 3px;
  font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:600;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:transform .15s;line-height:1.2;
}
.act-btn:active{transform:scale(.93);}
.act-btn .icon{font-size:.95rem;}
.act-btn .sub{font-size:.55rem;font-weight:400;opacity:.7;}
.btn-nope{background:var(--c-red-bg);color:var(--c-red);}
.btn-meh{background:var(--c-orange-bg);color:var(--c-orange);}
.btn-ok{background:var(--c-blue-bg);color:var(--c-blue);}
.btn-yes{background:var(--c-green-bg);color:var(--c-green);}

.statsrow{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 10px 6px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;text-align:center;padding:4px 3px;}
.stat-n{font-size:.95rem;font-weight:600;color:var(--text);}
.stat-l{font-size:.55rem;color:var(--muted);margin-top:1px;}
.stat-n.s0{color:var(--c-red);}
.stat-n.s1{color:var(--c-orange);}
.stat-n.s2{color:var(--c-blue);}
.stat-n.s3{color:var(--c-green);}

.reset-row{flex:0 0 auto;text-align:center;padding:0 0 5px;}
.reset-btn{background:none;border:none;font-size:.65rem;color:var(--muted);cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif;}
.reset-btn:hover{color:var(--text);}
.kbd-hint{flex:0 0 auto;text-align:center;font-size:.58rem;color:var(--muted);padding:0 0 5px;opacity:.5;}

.toast{
  position:fixed;bottom:65px;left:50%;transform:translateX(-50%) translateY(14px);
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-size:.73rem;padding:7px 15px;border-radius:99px;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:99;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-height:680px){
  .topbar{padding:7px 14px 3px;}
  .prog-wrap{padding:0 14px 3px;}
  .tabs{padding:0 14px 3px;}
  .dots{padding:3px 14px 0;}
  .actions{padding:3px 10px 3px;}
  .statsrow{padding:0 10px 3px;}
  .reset-row{padding:0 0 2px;}
  .kbd-hint{display:none;}
  .act-btn{padding:6px 2px;}
}
@media(max-width:380px){
  .act-btn .sub{display:none;}
  .card-word{font-size:1.1rem;}
  .subject-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- ════════════════ HOME ════════════════ -->
<div id="home">
  <h1 class="home-title">Révisions BTS</h1>
  <p class="home-sub">Choisissez votre matière</p>
  <div class="subject-grid">
    <div class="subject-card cejm" onclick="startSubject('cejm')">
      <div class="subject-icon">📊</div>
      <div class="subject-name">CEJM</div>
      <div class="subject-count">Éco · Droit · Management</div>
      <div class="subject-pill pill-cejm">SIO 1 & 2</div>
    </div>
    <div class="subject-card francais" onclick="startSubject('francais')">
      <div class="subject-icon">🐾</div>
      <div class="subject-name">Français</div>
      <div class="subject-count">Les animaux et nous</div>
      <div class="subject-pill pill-fr">BTS</div>
    </div>
  </div>
</div>

<!-- ════════════════ APP ════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goHome()">← Accueil</button>
      <div class="title-block">
        <h1 id="appTitle">CEJM</h1>
        <p id="appSub">Répétition espacée</p>
      </div>
    </div>
    <div class="counter">Carte <strong id="cntCur">1</strong> / <strong id="cntTot">1</strong></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:2%"></div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="card-status" id="sfFront"></div>
        <div class="badge" id="bFront"></div>
        <div class="card-word" id="fWord"></div>
        <div class="card-author" id="fAuthor"></div>
        <div class="card-chap" id="fChap"></div>
        <div class="card-tap">Appuyer pour voir la définition</div>
      </div>
      <div class="face back">
        <div class="card-status" id="sfBack"></div>
        <div class="badge" id="bBack"></div>
        <div class="card-def" id="bDef"></div>
        <div class="card-ex" id="bEx"></div>
      </div>
    </div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="actions">
    <button class="act-btn btn-nope" id="btn0"><span class="icon">✗</span><span>Pas acquis</span><span class="sub">dans 3–5</span></button>
    <button class="act-btn btn-meh" id="btn1"><span class="icon">◐</span><span>En cours</span><span class="sub">dans 5–10</span></button>
    <button class="act-btn btn-ok" id="btn2"><span class="icon">✓</span><span>Acquis</span><span class="sub">dans 15–22</span></button>
    <button class="act-btn btn-yes" id="btn3"><span class="icon">★</span><span>Je sais</span><span class="sub">dans 30–35</span></button>
  </div>

  <div class="statsrow">
    <div class="stat"><div class="stat-n s0" id="sn0">0</div><div class="stat-l">Pas acquis</div></div>
    <div class="stat"><div class="stat-n s1" id="sn1">0</div><div class="stat-l">En cours</div></div>
    <div class="stat"><div class="stat-n s2" id="sn2">0</div><div class="stat-l">Acquis</div></div>
    <div class="stat"><div class="stat-n s3" id="sn3">0</div><div class="stat-l">Je sais</div></div>
  </div>

  <div class="reset-row"><button class="reset-btn" id="resetBtn">↺ Réinitialiser la session</button></div>
  <div class="kbd-hint">Espace = retourner &nbsp;·&nbsp; 1 2 3 4 = noter</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   DATA — CEJM
══════════════════════════════════════════ */
const CEJM = [
  /* ── SIO1 Thème 1 – Économie ch1 ── */
  {m:"cejm",t:"eco",w:"Partie prenante",author:"Freeman",chap:"Éco Ch.1 — Entreprise",
   d:"Personne ou groupe affecté par la réalisation des objectifs d'une entreprise. On distingue les parties prenantes primaires (lien contractuel) des secondaires. Les primaires se divisent en internes et externes.",ex:""},
  {m:"cejm",t:"eco",w:"Logique entrepreneuriale",author:"",chap:"Éco Ch.1 — Entreprise",
   d:"Témoignée par la volonté d'entreprendre, la prise de risque, l'observation d'une opportunité de marché ou la capacité à innover.",ex:""},
  {m:"cejm",t:"eco",w:"Logique managériale",author:"",chap:"Éco Ch.1 — Entreprise",
   d:"Un manager organise, dirige et coordonne des tâches. Il gère les ressources humaines, fixe des objectifs et la stratégie à suivre.",ex:""},
  {m:"cejm",t:"eco",w:"Finalité",author:"Drucker",chap:"Éco Ch.1 — Entreprise",
   d:"Raison d'être de l'entreprise, s'inscrit sur le long terme. 3 types : finalité économique, sociale et sociétale. D'après Drucker, la finalité première est sociale et sociétale.",ex:""},
  {m:"cejm",t:"eco",w:"RSE",author:"",chap:"Éco Ch.1 — Entreprise",
   d:"Responsabilité Sociale et Sociétale de l'Entreprise : prise en compte des dimensions sociales et sociétales lors de l'activité d'une entreprise.",ex:""},
  {m:"cejm",t:"eco",w:"Performance",author:"",chap:"Éco Ch.1 — Entreprise",
   d:"Capacité d'une entreprise à atteindre ses objectifs. Elle est économique, financière, commerciale, sociale et environnementale. Composantes : efficacité (résultat conforme à l'objectif) et efficience (résultat obtenu avec un minimum de moyens).",ex:""},
  /* ── Droit ch2 ── */
  {m:"cejm",t:"droit",w:"Contrat",author:"",chap:"Droit Ch.2 — Contrats",
   d:"Accord de volonté entre deux parties.",ex:""},
  {m:"cejm",t:"droit",w:"Force obligatoire",author:"",chap:"Droit Ch.2 — Contrats",
   d:"Principe selon lequel le contrat a force de loi entre les parties.",ex:""},
  {m:"cejm",t:"droit",w:"Résolution",author:"",chap:"Droit Ch.2 — Contrats",
   d:"Anéantissement rétroactif du contrat.",ex:""},
  {m:"cejm",t:"droit",w:"Résiliation",author:"",chap:"Droit Ch.2 — Contrats",
   d:"Fin du lien contractuel pour l'avenir, concerne les contrats à exécutions successives.",ex:""},
  {m:"cejm",t:"droit",w:"Bonne foi",author:"",chap:"Droit Ch.2 — Contrats",
   d:"Les parties doivent vouloir contracter et être sincères.",ex:""},
  {m:"cejm",t:"droit",w:"Situation pré-contractuelle",author:"",chap:"Droit Ch.2 — Contrats",
   d:"Phase de pourparlers, de négociation avant l'aboutissement du contrat.",ex:""},
  {m:"cejm",t:"droit",w:"Conditions de validité du contrat",author:"",chap:"Droit Ch.2 — Contrats",
   d:"1. Consentement libre (sans violence) et éclairé (sans erreur ni dol). 2. Capacité de contracter : 18 ans révolus, ne pas être majeur incapable. 3. Contenu licite et certain.",ex:""},
  /* ── Éco ch3 ── */
  {m:"cejm",t:"eco",w:"Agent économique",author:"",chap:"Éco Ch.3 — Marchés",
   d:"Unité institutionnelle qui contribue à l'activité économique : ménages, sociétés non-financières, sociétés financières, institutions sans but lucratif, administrations publiques, reste du monde.",ex:""},
  {m:"cejm",t:"eco",w:"Asymétrie d'information",author:"",chap:"Éco Ch.3 — Marchés",
   d:"Situation où l'offreur et le demandeur ne disposent pas des mêmes informations sur le bien ou service échangé.",ex:""},
  {m:"cejm",t:"eco",w:"Barrières à l'entrée",author:"",chap:"Éco Ch.3 — Marchés",
   d:"Obstacle rencontré par une entreprise pour accéder à un marché. Elles peuvent être stratégiques, réglementaires ou économiques.",ex:""},
  {m:"cejm",t:"eco",w:"Externalité",author:"",chap:"Éco Ch.3 — Marchés",
   d:"Effets indirects non recherchés résultant de l'activité d'une entreprise et non pris en compte par le marché. Elles peuvent être négatives ou positives.",ex:""},
  /* ── Management ch4 ── */
  {m:"cejm",t:"mgt",w:"Compétitivité",author:"",chap:"Mgt Ch.4 — Environnement",
   d:"Capacité pour une entreprise à maintenir ou accroître ses parts de marché. On distingue la compétitivité-prix de la compétitivité hors-prix.",ex:""},
  {m:"cejm",t:"mgt",w:"Innovation",author:"",chap:"Mgt Ch.4 — Environnement",
   d:"Mise en œuvre au sein de l'entreprise d'une invention. 4 types : innovation de produit, de procédé, de commercialisation et d'organisation.",ex:""},
  {m:"cejm",t:"mgt",w:"Macro-environnement",author:"",chap:"Mgt Ch.4 — Environnement",
   d:"Éléments extérieurs à l'entreprise qu'elle ne peut pas ou peu influencer.",ex:""},
  {m:"cejm",t:"mgt",w:"PESTEL",author:"",chap:"Mgt Ch.4 — Environnement",
   d:"Modèle d'analyse du macro-environnement en termes d'opportunités ou menaces selon 6 facteurs : Politiques, Économiques, Socioculturels, Technologiques, Environnementaux, Légaux.",ex:""},
  /* ── Droit ch5 ── */
  {m:"cejm",t:"droit",w:"Abus de position dominante",author:"",chap:"Droit Ch.5 — Concurrence",
   d:"Pratique anticoncurrentielle qui verrouille la concurrence. Il faut démontrer : existence d'une position dominante, exploitation abusive de cette position, effet restrictif sur le jeu de la concurrence.",ex:""},
  {m:"cejm",t:"droit",w:"Brevet",author:"",chap:"Droit Ch.5 — Concurrence",
   d:"Titre de propriété intellectuelle concernant une invention, permettant un monopole d'exploitation. Durée : 20 ans.",ex:""},
  {m:"cejm",t:"droit",w:"Entente",author:"",chap:"Droit Ch.5 — Concurrence",
   d:"Accord entre plusieurs acteurs pour ajuster leurs pratiques commerciales. Elle peut être horizontale (avec des concurrents) ou verticale (fournisseurs ou clients).",ex:""},
  {m:"cejm",t:"droit",w:"Marque",author:"",chap:"Droit Ch.5 — Concurrence",
   d:"Signe distinctif représentant une entreprise, un bien ou un service. Durée : 10 ans renouvelable. En France, déposée à l'INPI. Elle doit être distinctive, licite, non déceptive et disponible.",ex:""},
  /* ── Éco ch6 ── */
  {m:"cejm",t:"eco",w:"Politique conjoncturelle",author:"Kaldor",chap:"Éco Ch.6 — Politique éco.",
   d:"Mesures prises par un gouvernement pour maintenir ou retrouver les équilibres économiques du carré magique de Kaldor : PIB, inflation, chômage, Balance des transactions courantes.",ex:""},
  {m:"cejm",t:"eco",w:"Carré magique de Kaldor",author:"Kaldor",chap:"Éco Ch.6 — Politique éco.",
   d:"Graphique à 4 indicateurs représentant la situation économique d'un pays : PIB (croissance), inflation, chômage et Balance des transactions courantes (BTC = exportations − importations).",ex:""},
  {m:"cejm",t:"eco",w:"Politique structurelle",author:"",chap:"Éco Ch.6 — Politique éco.",
   d:"Mesures prises par un gouvernement pour agir durablement sur la structure de l'économie.",ex:""},
  {m:"cejm",t:"eco",w:"Fonctions de l'État",author:"",chap:"Éco Ch.6 — Politique éco.",
   d:"Allocation : usage optimal des ressources. Stabilisation : plein emploi et stabilité des prix. Redistribution : corriger la répartition des richesses.",ex:""},
  {m:"cejm",t:"eco",w:"Croissance endogène",author:"",chap:"Éco Ch.6 — Politique éco.",
   d:"Croissance économique réalisée avec l'aide de l'État, résultant d'investissements sur le long terme (capital humain, recherche, infrastructures).",ex:""},
  {m:"cejm",t:"eco",w:"Politique monétaire",author:"",chap:"Éco Ch.6 — Politique éco.",
   d:"Mesures qui veillent à la stabilité de la valeur de la monnaie (menée par la Banque centrale européenne pour la zone euro).",ex:""},
  /* ── Management ch7 ── */
  {m:"cejm",t:"mgt",w:"Compétences",author:"",chap:"Mgt Ch.7 — Organisation",
   d:"Aptitudes à combiner des ressources grâce à des savoir-faire individuels ou collectifs. Compétences transversales (utiles dans diverses situations) vs compétences spécifiques.",ex:""},
  {m:"cejm",t:"mgt",w:"Contre-pouvoir des parties prenantes",author:"Crozier & Friedberg",chap:"Mgt Ch.7 — Organisation",
   d:"D'après Crozier et Friedberg, capacité des parties prenantes à conserver une marge de manœuvre vis-à-vis de l'autorité en augmentant leur zone d'incertitude.",ex:""},
  {m:"cejm",t:"mgt",w:"Mécanismes de coordination",author:"",chap:"Mgt Ch.7 — Organisation",
   d:"Système d'échange propre à chaque entreprise pour répartir les tâches : supervision directe, ajustement mutuel, et standardisation des normes, qualifications, procédés et résultats.",ex:""},
  {m:"cejm",t:"mgt",w:"Style de management",author:"Likert",chap:"Mgt Ch.7 — Organisation",
   d:"D'après Likert, manière d'exercer le pouvoir de direction. 4 styles : autoritaire, paternaliste, consultatif et participatif.",ex:""},
  {m:"cejm",t:"mgt",w:"Structures",author:"",chap:"Mgt Ch.7 — Organisation",
   d:"Architecture organisationnelle prévoyant la répartition du pouvoir et la division du travail : structure fonctionnelle, divisionnelle, matricielle, par projet, etc.",ex:""},
  /* ── Droit ch8 ── */
  {m:"cejm",t:"droit",w:"SARL",author:"",chap:"Droit Ch.8 — Statuts juridiques",
   d:"Société à Responsabilité Limitée : la responsabilité financière est limitée aux apports, mais la cession des parts nécessite l'accord des autres associés.",ex:""},
  {m:"cejm",t:"droit",w:"SA",author:"",chap:"Droit Ch.8 — Statuts juridiques",
   d:"Société Anonyme : forme juridique des grandes entreprises, le capital est divisé en actions librement cessibles.",ex:""},
  {m:"cejm",t:"droit",w:"SAS",author:"",chap:"Droit Ch.8 — Statuts juridiques",
   d:"Société par Actions Simplifiée : se caractérise par une grande liberté contractuelle dans son organisation.",ex:""},
  {m:"cejm",t:"droit",w:"Économie sociale et solidaire",author:"",chap:"Droit Ch.8 — Statuts juridiques",
   d:"Ensemble d'entreprises sous forme de coopératives, mutuelles, associations dont le fonctionnement et l'activité sont basés sur le principe de solidarité.",ex:""},
  /* ── Éco ch9 ── */
  {m:"cejm",t:"eco",w:"Chaîne de valeur de Porter",author:"Porter",chap:"Éco Ch.9 — Production",
   d:"Outil d'analyse distinguant les activités principales (créatrices de valeur pour le client) et les activités de soutien qu'il convient éventuellement de sous-traiter.",ex:""},
  {m:"cejm",t:"eco",w:"Combinaison productive",author:"",chap:"Éco Ch.9 — Production",
   d:"Association des facteurs de production. Plus de travail que de capital = combinaison organique (intensive en travail). L'inverse = combinaison capitalistique.",ex:""},
  {m:"cejm",t:"eco",w:"Coûts de production",author:"",chap:"Éco Ch.9 — Production",
   d:"Charges payées par l'entreprise : consommations intermédiaires (matières premières, factures…) et rémunération des salariés. Se décomposent en coûts fixes et coûts variables.",ex:""},
  {m:"cejm",t:"eco",w:"Impartition",author:"",chap:"Éco Ch.9 — Production",
   d:"Externalisation qui consiste à confier à des partenaires extérieurs des tâches non stratégiques.",ex:""},
  {m:"cejm",t:"eco",w:"Gains de productivité",author:"",chap:"Éco Ch.9 — Production",
   d:"Amélioration de la productivité grâce à l'innovation, se traduisant par une amélioration des performances de l'économie nationale.",ex:""},
  /* ── Éco ch10 ── */
  {m:"cejm",t:"eco",w:"Compte de résultat",author:"",chap:"Éco Ch.10 — Finance",
   d:"Document comptable synthétisant l'ensemble des charges et produits d'un exercice comptable. Permet de déterminer le résultat net (bénéfice ou perte).",ex:""},
  {m:"cejm",t:"eco",w:"Bilan",author:"",chap:"Éco Ch.10 — Finance",
   d:"Document représentant la situation patrimoniale d'une entreprise à une date donnée, en termes d'emplois (actif) et de ressources (passif).",ex:""},
  {m:"cejm",t:"eco",w:"FRNG",author:"",chap:"Éco Ch.10 — Finance",
   d:"Fonds de Roulement Net Global : ressources stables disponibles pour financer les besoins du cycle d'exploitation en attendant les encaissements clients.",ex:"FRNG = Ressources stables − Emplois stables"},
  {m:"cejm",t:"eco",w:"BFR",author:"",chap:"Éco Ch.10 — Finance",
   d:"Besoin en Fonds de Roulement : montant dont l'entreprise a besoin pour financer son cycle d'exploitation en attendant de recevoir les paiements de ses clients.",ex:"BFR = Stocks + Créances clients − Dettes fournisseurs"},
  {m:"cejm",t:"eco",w:"Trésorerie",author:"",chap:"Éco Ch.10 — Finance",
   d:"Ensemble des sommes d'argent disponibles en caisse ou en banque. Trésorerie = FRNG − BFR.",ex:""},
  /* ── SIO2 Thème 4 – Management ch1 ── */
  {m:"cejm",t:"mgt",w:"Système d'information (SI)",author:"",chap:"Mgt Ch.4 SIO2 — SI & Organisation",
   d:"Ensemble organisé des ressources (matériel, logiciel, personnel, données…) permettant d'acquérir, stocker, traiter et diffuser l'information.",ex:""},
  {m:"cejm",t:"mgt",w:"Flexibilité",author:"",chap:"Mgt Ch.4 SIO2 — SI & Organisation",
   d:"Souplesse d'une organisation à répondre aux fluctuations de son environnement. Quantitative externe (embauche, licenciement), quantitative interne (horaires), qualitative externe (sous-traitance), qualitative interne (formation).",ex:""},
  {m:"cejm",t:"mgt",w:"Résistance au changement",author:"",chap:"Mgt Ch.4 SIO2 — SI & Organisation",
   d:"Comportement ou attitude indiquant le refus d'obtempérer à un changement organisationnel.",ex:""},
  /* ── Droit ch2 SIO2 ── */
  {m:"cejm",t:"droit",w:"Données personnelles",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"Information identifiant directement ou indirectement une personne (nom, numéro de téléphone, date de naissance, photographie…).",ex:""},
  {m:"cejm",t:"droit",w:"Droit d'auteur",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"Ensemble des droits d'un auteur sur des œuvres de l'esprit originales. Droits patrimoniaux (exploitation) et droits moraux (divulgation, paternité…).",ex:""},
  {m:"cejm",t:"droit",w:"Droit sui generis",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"Protection juridique spécifique du contenu des bases de données.",ex:""},
  /* ── Éco ch3 SIO2 ── */
  {m:"cejm",t:"eco",w:"Désintermédiation",author:"",chap:"Éco Ch.3 SIO2 — Économie numérique",
   d:"Phénomène de mise en relation directe des acteurs économiques, réduisant ou supprimant les intermédiaires traditionnels.",ex:""},
  {m:"cejm",t:"eco",w:"Économie de l'usage",author:"",chap:"Éco Ch.3 SIO2 — Économie numérique",
   d:"Modèle qui remplace la vente d'un bien par la vente d'un service (ex. : location de voiture, streaming).",ex:""},
  {m:"cejm",t:"eco",w:"Économie collaborative",author:"",chap:"Éco Ch.3 SIO2 — Économie numérique",
   d:"Système de mutualisation et d'échanges de services, ressources, biens ou savoirs entre différents acteurs.",ex:""},
  {m:"cejm",t:"eco",w:"Externalité de réseau",author:"",chap:"Éco Ch.3 SIO2 — Économie numérique",
   d:"Phénomène d'augmentation de l'attractivité d'une place de marché due à son grand nombre d'utilisateurs.",ex:""},
  {m:"cejm",t:"eco",w:"Place de marché",author:"",chap:"Éco Ch.3 SIO2 — Économie numérique",
   d:"Lieu virtuel d'échanges entre offreurs et demandeurs de biens et services, reposant souvent sur des transactions sécurisées.",ex:"Ex. : Amazon Marketplace, Airbnb."},
  /* ── Management ch4 SIO2 ── */
  {m:"cejm",t:"mgt",w:"GPEC",author:"",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"Gestion Prévisionnelle des Emplois et des Compétences : dispositif RH qui adapte qualitativement (compétences) et quantitativement les ressources humaines aux stratégies de l'entreprise.",ex:""},
  {m:"cejm",t:"mgt",w:"Gestion des talents",author:"",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"Le talent est une combinaison rare de compétences rares. La gestion des talents vise à valoriser ces compétences particulières pour en faire une personne clé de l'entreprise.",ex:""},
  {m:"cejm",t:"mgt",w:"Facteurs de motivation",author:"Herzberg",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"D'après Herzberg : facteurs d'hygiène (salaire, conditions de travail → satisfaction) et facteurs de motivation (estime, accomplissement → véritables leviers de motivation).",ex:""},
  {m:"cejm",t:"mgt",w:"Ratio d'équité",author:"Adams",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"D'après Adams, un individu est motivé à réduire les inégalités ressenties par rapport à un autre employé. Si rétribution/contribution < que chez un collègue, il travaillera plus.",ex:""},
  {m:"cejm",t:"mgt",w:"Pyramide de Maslow",author:"Maslow",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"Hiérarchisation des besoins au travail (du plus bas au plus haut) : Survie (juste rémunération) → Sécurité (stabilité d'emploi) → Appartenance → Reconnaissance/estime → Réalisation de soi.",ex:""},
  /* ── Droit ch5 SIO2 ── */
  {m:"cejm",t:"droit",w:"Convention collective",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Texte négocié entre le(s) représentant(s) de l'employeur et les syndicats des travailleurs, fixant les conditions de travail au-delà du Code du travail.",ex:""},
  {m:"cejm",t:"droit",w:"Clause de non-concurrence",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Disposition contractuelle obligeant le salarié à ne pas exercer une activité susceptible de concurrencer l'employeur après la rupture du contrat.",ex:""},
  {m:"cejm",t:"droit",w:"Rupture conventionnelle",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Modalité de rupture du contrat de travail à l'accord commun de l'employé et de l'employeur, ouvrant droit aux allocations chômage.",ex:""},
  {m:"cejm",t:"droit",w:"Licenciement pour motif économique",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Rupture du contrat de travail à l'initiative de l'employeur résultant de difficultés économiques ou d'une réorganisation nécessaire à la sauvegarde de la compétitivité.",ex:""},
  {m:"cejm",t:"droit",w:"Plan de sauvegarde de l'emploi",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Dispositif légal ayant pour objectif de limiter les conséquences des licenciements collectifs (obligatoire à partir de 10 licenciements sur 30 jours dans une entreprise de +50 salariés).",ex:""},
  /* ── Éco ch6 SIO2 ── */
  {m:"cejm",t:"eco",w:"Segmentation du marché du travail",author:"",chap:"Éco Ch.6 SIO2 — Marché du travail",
   d:"Le marché du travail comprend différents compartiments : marché primaire (emplois stables), marché secondaire (emplois précaires), marché externe (concurrentiel), marché interne (interne aux entreprises).",ex:""},
  {m:"cejm",t:"eco",w:"Politiques de l'emploi",author:"",chap:"Éco Ch.6 SIO2 — Marché du travail",
   d:"Décisions politiques pour corriger les déséquilibres du marché du travail. Politiques actives : incitation au travail. Politiques passives : indemnisation du chômage ou des retraites.",ex:""},
  {m:"cejm",t:"eco",w:"Tension (marché du travail)",author:"",chap:"Éco Ch.6 SIO2 — Marché du travail",
   d:"Situation de déséquilibre sur le marché du travail où l'offre d'emploi est supérieure à la demande (pénurie de candidats).",ex:""},
  /* ── Management ch7-8 SIO2 ── */
  {m:"cejm",t:"mgt",w:"Décision stratégique",author:"",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"Décision qui engage la pérennité de l'entreprise sur le long terme et mobilise des ressources importantes. S'oppose aux décisions tactiques et opérationnelles.",ex:""},
  {m:"cejm",t:"mgt",w:"Diagnostic stratégique",author:"",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"Analyse des différentes variables pouvant influer sur l'activité de l'entreprise. Comprend un diagnostic externe (PESTEL + 5 forces de Porter) et interne (ressources et compétences).",ex:""},
  {m:"cejm",t:"mgt",w:"5 Forces de Porter",author:"Porter",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"Outil d'analyse concurrentielle du micro-environnement : concurrents directs, nouveaux entrants, produits de substitution, pouvoir de négociation des clients, pouvoir de négociation des fournisseurs.",ex:""},
  {m:"cejm",t:"mgt",w:"Stratégie délibérée",author:"Mintzberg",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"D'après Mintzberg, stratégie planifiée à l'issue du diagnostic stratégique, résultant d'une démarche intentionnelle et rationnelle.",ex:""},
  {m:"cejm",t:"mgt",w:"Stratégie émergente",author:"Mintzberg",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"D'après Mintzberg, stratégie issue d'évolutions non prévues de l'environnement, qui modifie la stratégie délibérée pour former la stratégie réalisée.",ex:""},
  {m:"cejm",t:"mgt",w:"Modèle IMC",author:"",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"Intelligence (identification et analyse des problématiques) → Modélisation (classement des solutions selon risques et opportunités) → Choix (sélection de la meilleure solution).",ex:""},
  {m:"cejm",t:"mgt",w:"Stratégie globale",author:"",chap:"Mgt Ch.8 SIO2 — Stratégie de domaine",
   d:"Concerne l'entreprise dans sa globalité : spécialisation ou diversification, internalisation ou externalisation.",ex:""},
  {m:"cejm",t:"mgt",w:"Domaine d'activité stratégique (DAS)",author:"",chap:"Mgt Ch.8 SIO2 — Stratégie de domaine",
   d:"Ensemble homogène de marchés et de produits auquel on alloue ou retire des ressources sans affecter le reste de l'entreprise.",ex:""},
  {m:"cejm",t:"mgt",w:"Stratégie de domaine",author:"Porter",chap:"Mgt Ch.8 SIO2 — Stratégie de domaine",
   d:"D'après Porter, 3 stratégies génériques pour un DAS : domination par les coûts, différenciation (caractère unique du produit) et focalisation (cibler un segment précis).",ex:""},
  {m:"cejm",t:"mgt",w:"Modalités de croissance",author:"",chap:"Mgt Ch.8 SIO2 — Stratégie de domaine",
   d:"Une entreprise peut croître par : croissance interne (mobiliser ses propres ressources), croissance externe (acquisition d'une autre entreprise) et croissance conjointe (coopération).",ex:""},

  /* ── NOUVELLES FLASHCARDS — Droit (Responsabilité civile) ── */
  {m:"cejm",t:"droit",w:"Conditions de la responsabilité civile",author:"",chap:"Droit — Responsabilité civile",
   d:"Trois conditions cumulatives : un fait générateur, un dommage et un lien de causalité entre les deux.",ex:""},
  {m:"cejm",t:"droit",w:"Responsabilité contractuelle vs délictuelle",author:"",chap:"Droit — Responsabilité civile",
   d:"S'il existe un contrat entre les parties au moment du dommage → responsabilité contractuelle. S'il n'y a aucun contrat → responsabilité délictuelle (extra-contractuelle).",ex:""},
  {m:"cejm",t:"droit",w:"Contrefaçon vs concurrence déloyale",author:"",chap:"Droit Ch.5 — Concurrence",
   d:"Si un brevet ou une marque est violé → délit de contrefaçon. Si c'est du dénigrement, de l'imitation ou de la désorganisation sans droit de propriété industrielle violé → concurrence déloyale.",ex:""},
  {m:"cejm",t:"droit",w:"Autorités de la concurrence",author:"",chap:"Droit Ch.5 — Concurrence",
   d:"L'Autorité de la concurrence veille au respect du droit de la concurrence en France, et la Commission européenne au niveau de l'Union européenne.",ex:""},
  {m:"cejm",t:"droit",w:"Brevet vs Marque (durée)",author:"",chap:"Droit Ch.5 — Concurrence",
   d:"Le brevet protège une invention technique pendant 20 ans (non renouvelable). La marque protège un signe distinctif (nom, logo) et est renouvelable indéfiniment tous les 10 ans.",ex:""},
  {m:"cejm",t:"droit",w:"CNIL et RGPD",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"La CNIL régule l'usage des données personnelles en France. Le RGPD (Règlement Général sur la Protection des Données, 2018) s'impose à l'échelle européenne et mondiale pour les résidents de l'UE.",ex:""},
  {m:"cejm",t:"droit",w:"Droits garantis par le RGPD",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"Quatre grands droits : droit d'accès, droit de rectification, droit d'opposition et droit à la suppression (droit au déréférencement).",ex:""},
  {m:"cejm",t:"droit",w:"Protection des bases de données",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"Les bases de données bénéficient d'une protection spécifique (droit sui generis) de 15 ans, indépendante du droit d'auteur classique.",ex:""},
  {m:"cejm",t:"droit",w:"Contrat de vente électronique",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"Le vendeur doit afficher clairement les caractéristiques, le prix TTC, les délais de livraison et son identité. Le client doit pouvoir vérifier et corriger sa commande avant validation (principe du double clic).",ex:""},
  {m:"cejm",t:"droit",w:"Délai de rétractation (vente en ligne)",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"L'acheteur dispose d'un délai de 14 jours pour se rétracter, sans avoir à fournir de justification.",ex:""},
  {m:"cejm",t:"droit",w:"Valeur probante d'un écrit électronique",author:"",chap:"Droit Ch.2 SIO2 — Numérique & Droit",
   d:"Deux conditions cumulatives : l'auteur du document doit être clairement identifiable ET l'intégrité du document doit être garantie (aucune modification possible après signature).",ex:""},
  {m:"cejm",t:"droit",w:"Lien de subordination juridique",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Critère qui distingue le salarié du travailleur indépendant : l'employeur a le pouvoir de donner des ordres, de contrôler l'exécution du travail et de sanctionner le salarié.",ex:""},
  {m:"cejm",t:"droit",w:"CDD — renouvellement",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Un CDD doit reposer sur un motif valable et précis (ex. : remplacement d'un salarié absent). Son renouvellement est limité à deux fois maximum.",ex:""},
  {m:"cejm",t:"droit",w:"Modification du contrat de travail",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"La modification des conditions de travail (organisation courante) s'impose au salarié. La modification du contrat (rémunération, qualification, durée) requiert impérativement l'accord écrit du salarié.",ex:""},
  {m:"cejm",t:"droit",w:"PSE — seuil légal",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"Le Plan de Sauvegarde de l'Emploi est légalement obligatoire lorsqu'une entreprise de plus de 50 salariés envisage de licencier au moins 10 personnes sur une période de 30 jours.",ex:""},
  {m:"cejm",t:"droit",w:"Entretien annuel vs entretien professionnel",author:"",chap:"Droit Ch.5 SIO2 — Droit du travail",
   d:"L'entretien annuel d'évaluation (outil managérial) a lieu tous les ans. L'entretien professionnel est légalement obligatoire tous les deux ans (axé sur l'évolution et les compétences).",ex:""},

  /* ── NOUVELLES FLASHCARDS — Management ── */
  {m:"cejm",t:"mgt",w:"Trois niveaux de management",author:"",chap:"Mgt Ch.7 — Organisation",
   d:"Management stratégique (long terme, vision globale), management tactique (moyen terme, coordination) et management opérationnel (court terme, exécution sur le terrain).",ex:""},
  {m:"cejm",t:"mgt",w:"6 mécanismes de coordination (Mintzberg)",author:"Mintzberg",chap:"Mgt Ch.7 — Organisation",
   d:"Ajustement mutuel, supervision directe, standardisation des résultats, standardisation des qualifications, standardisation des procédés et standardisation des normes.",ex:""},
  {m:"cejm",t:"mgt",w:"3 catégories de processus",author:"",chap:"Mgt Ch.7 — Organisation",
   d:"Processus de pilotage (ou de management), processus de réalisation (ou opérationnels) et processus de support.",ex:""},
  {m:"cejm",t:"mgt",w:"Théorie de Vroom (attentes)",author:"Vroom",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"Trois facteurs combinés pour la motivation : l'attente (croyance en sa capacité de réussir), l'instrumentalité (probabilité d'obtenir une récompense) et la valence (valeur accordée à cette récompense).",ex:""},
  {m:"cejm",t:"mgt",w:"Pyramide de Maslow — 5 niveaux",author:"Maslow",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"De la base au sommet : 1. Besoins physiologiques (faim, soif, survie) → 2. Sécurité (logement, emploi, stabilité) → 3. Appartenance (famille, groupe) → 4. Estime (respect, reconnaissance) → 5. Accomplissement (créativité, potentiel).",ex:"Mnémotechnique : Physiologique → Sécurité → Social → Estime → Accomplissement"},
  {m:"cejm",t:"mgt",w:"Herzberg — théorie bifactorielle",author:"Herzberg",chap:"Mgt Ch.4 SIO2 — RH & Compétences",
   d:"Facteurs d'hygiène (salaire, sécurité, conditions physiques) : évitent la démotivation mais n'engagent pas. Facteurs de motivation (intérêt des missions, autonomie, responsabilités) : créent la véritable satisfaction.",ex:""},
  {m:"cejm",t:"mgt",w:"Politique active vs passive de l'emploi",author:"",chap:"Éco Ch.6 SIO2 — Marché du travail",
   d:"Politique active : insérer ou maintenir dans l'emploi (formation, allègements de charges, France Travail). Politique passive : compenser la perte de revenus liée au chômage (allocations chômage).",ex:""},

  /* ── NOUVELLES FLASHCARDS — Économie ── */
  {m:"cejm",t:"eco",w:"Politique structurelle vs conjoncturelle",author:"",chap:"Éco Ch.6 — Politique éco.",
   d:"Politique structurelle : long terme, modifie la structure même de l'économie. Politique conjoncturelle : court terme, stabilise ou relance l'activité économique immédiate.",ex:""},
  {m:"cejm",t:"eco",w:"Effets de réseau directs vs indirects",author:"",chap:"Éco Ch.3 SIO2 — Économie numérique",
   d:"Directs : la valeur augmente avec le nombre total d'utilisateurs du même groupe (ex. : réseau social). Indirects : la valeur augmente pour un groupe grâce à l'arrivée d'utilisateurs d'un groupe complémentaire (ex. : acheteurs/vendeurs sur une marketplace).",ex:""},
  {m:"cejm",t:"eco",w:"Norme vs Standard",author:"",chap:"Éco Ch.3 SIO2 — Économie numérique",
   d:"Une norme est adoptée officiellement par des organismes reconnus (ISO, AFNOR) pour garantir l'interopérabilité. Un standard s'impose sur le marché par la pratique et l'usage des acteurs.",ex:""},
  {m:"cejm",t:"eco",w:"Financement du cycle d'exploitation",author:"",chap:"Éco Ch.10 — Finance",
   d:"Trois outils à court terme : le crédit bancaire, l'affacturage (cession de créances) et les délais de paiement accordés par les fournisseurs.",ex:""},
  {m:"cejm",t:"eco",w:"Innovation de rupture",author:"",chap:"Mgt Ch.4 — Environnement",
   d:"Type d'innovation qui bouleverse radicalement un marché ou une technologie existante, par opposition à l'innovation incrémentale (amélioration progressive). 4 types au total : produit, procédé, organisationnelle, rupture.",ex:""},

  /* ── NOUVELLES FLASHCARDS — Stratégie ── */
  {m:"cejm",t:"mgt",w:"Diagnostic externe (outils)",author:"Porter",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"Macro-environnement : analyse PESTEL. Micro-environnement : 5 forces de Porter. But : identifier les Opportunités et Menaces du marché.",ex:""},
  {m:"cejm",t:"mgt",w:"Compétence distinctive",author:"",chap:"Mgt Ch.7 SIO2 — Stratégie",
   d:"Ce que l'entreprise sait faire de mieux : elle doit être rare et difficile à imiter par les concurrents. Identifiée via le diagnostic interne (forces et faiblesses) portant sur les ressources tangibles et intangibles.",ex:""},
  {m:"cejm",t:"mgt",w:"SWOT",author:"",chap:"Mgt Ch.7 SIO2 — Stratégie",

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=rand(0,i);[r[i],r[j]]=[r[j],r[i]];}return r;}

/* ═══════ STATE ═══════ */
let subj=null, cfg=null;
let theme="all";
let queue=[];
let cursor=0;
let status={};
let flipped=false;

function baseCards(){return cfg.data.filter(d=>theme==="all"||d.t===theme);}
function initQueue(){
  const base=baseCards();
  queue=shuffle(base.map(d=>cfg.data.indexOf(d)));
  cursor=0;flipped=false;
}
function cur(){return cfg.data[queue[cursor]];}

function startSubject(id){
  subj=id;cfg=SUBJ_CONFIG[id];theme="all";status={};
  document.getElementById("appTitle").textContent=cfg.title;
  document.getElementById("appSub").textContent=cfg.sub;
  // prog class
  const pf=document.getElementById("progFill");
  pf.className="prog-fill "+cfg.progClass;
  // rebuild tabs
  buildTabs();
  initQueue();
  document.getElementById("home").style.display="none";
  const app=document.getElementById("app");
  app.style.display="flex";
  render();
}

function goHome(){
  document.getElementById("app").style.display="none";
  document.getElementById("home").style.display="flex";
  subj=null;
}

function buildTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML="";
  cfg.themes.forEach(th=>{
    const b=document.createElement("button");
    b.className="tab"+(th.id===theme?" active":"");
    b.dataset.id=th.id;b.textContent=th.label;
    b.onclick=()=>{
      theme=th.id;
      document.querySelectorAll(".tab").forEach(t=>{
        t.classList.remove("active","tab-active-cejm","tab-active-fr");
      });
      b.classList.add("active",subj==="cejm"?"tab-active-cejm":"tab-active-fr");
      status={};initQueue();render();
    };
    el.appendChild(b);
  });
  // set active style on first
  el.children[0].classList.add(subj==="cejm"?"tab-active-cejm":"tab-active-fr");
}

function setScore(level){
  const card=cur();
  status[card.w]=level;
  const dist=rand(...SM[level].range);
  const insertAt=Math.min(cursor+dist,queue.length);
  for(let i=cursor+1;i<queue.length;i++){if(queue[i]===queue[cursor]){queue.splice(i,1);break;}}
  if(level<3) queue.splice(insertAt,0,queue[cursor]);
  cursor++;
  if(cursor>=queue.length){
    const unmastered=queue.slice(0,cursor).filter(i=>(status[cfg.data[i].w]??-1)<3);
    if(unmastered.length>0){
      queue=[...queue,...shuffle(unmastered)];
      showToast("Session terminée ! Révision des cartes non maîtrisées.");
    } else {
      showToast("🎉 Toutes les cartes sont maîtrisées !");
      cursor=queue.length-1;
    }
  }
  flipped=false;render();
}

function render(){
  const card=cur();
  const s=status[card.w]??-1;
  const tl=cfg.themeLabel[card.t]||card.t;
  const bc=cfg.badgeClass[card.t]||"b-eco";

  ["bFront","bBack"].forEach(id=>{const el=document.getElementById(id);el.className="badge "+bc;el.textContent=tl;});
  document.getElementById("fWord").textContent=card.w;
  const fa=document.getElementById("fAuthor");
  fa.textContent=card.author?`— ${card.author}`:"";
  document.getElementById("fChap").textContent=card.chap||"";
  document.getElementById("bDef").textContent=card.d;
  const exEl=document.getElementById("bEx");
  exEl.textContent=card.ex||"";exEl.style.display=card.ex?"":"none";

  ["sfFront","sfBack"].forEach(id=>{
    const el=document.getElementById(id);
    if(s>=0){const m=SM[s];el.textContent=m.label;el.style.cssText=`background:${m.bg};color:${m.color};font-size:.58rem;font-weight:600;padding:2px 8px;border-radius:99px;`;}
    else{el.textContent="";el.style.cssText="";}
  });

  document.getElementById("card").classList.toggle("flipped",flipped);
  const tot=queue.length;
  document.getElementById("cntCur").textContent=Math.min(cursor+1,tot);
  document.getElementById("cntTot").textContent=tot;

  const mastered=Object.values(status).filter(v=>v===3).length;
  const base=baseCards();
  const pct=base.length>0?Math.round(mastered/base.length*100):0;
  document.getElementById("progFill").style.width=pct+"%";

  // dots
  const dotsEl=document.getElementById("dots");
  const vis=Math.min(queue.length,30);
  let html="";
  for(let i=0;i<vis;i++){
    const qi=Math.floor(i*queue.length/vis);
    const w=cfg.data[queue[qi]]?.w;
    const sv=w&&w in status?status[w]:-1;
    const isCur=qi===cursor;
    let cls="dot";
    if(isCur) cls+=" cur "+cfg.curDotClass;
    else if(sv>=0) cls+=" s"+sv;
    html+=`<div class="${cls}"></div>`;
  }
  dotsEl.innerHTML=html;

  const counts=[0,0,0,0];
  Object.values(status).forEach(v=>{if(v>=0&&v<=3)counts[v]++;});
  for(let i=0;i<4;i++) document.getElementById("sn"+i).textContent=counts[i];
}

/* ═══════ EVENTS ═══════ */
document.getElementById("card").addEventListener("click",()=>{flipped=!flipped;document.getElementById("card").classList.toggle("flipped",flipped);});
[0,1,2,3].forEach(i=>{document.getElementById("btn"+i).addEventListener("click",e=>{e.stopPropagation();setScore(i);});});
document.getElementById("resetBtn").addEventListener("click",()=>{status={};initQueue();render();showToast("Session réinitialisée.");});

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

document.addEventListener("keydown",e=>{
  if(!subj) return;
  if(e.key===" "){e.preventDefault();document.getElementById("card").click();}
  else if(e.key==="1")setScore(0);
  else if(e.key==="2")setScore(1);
  else if(e.key==="3")setScore(2);
  else if(e.key==="4")setScore(3);
});
</script>
</body>
</html>
