<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flashcards — Les animaux et nous</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0f1117;}

:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#22263a;
  --border:#2e3250;
  --text:#eaeaf0;
  --muted:#6b7080;
  --accent:#7c6af7;
  --c-red:#ff5c5c;
  --c-red-bg:rgba(255,92,92,0.12);
  --c-orange:#ff9f43;
  --c-orange-bg:rgba(255,159,67,0.12);
  --c-blue:#5bb5ff;
  --c-blue-bg:rgba(91,181,255,0.12);
  --c-green:#44d9a0;
  --c-green-bg:rgba(68,217,160,0.12);
}

body{
  font-family:'DM Sans',sans-serif;
  display:flex;
  flex-direction:column;
  height:100dvh;
  color:var(--text);
}

/* TOP BAR */
.topbar{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px 8px;
}
.title-block h1{
  font-family:'DM Serif Display',serif;
  font-size:1.05rem;
  color:var(--text);
  line-height:1;
}
.title-block p{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.counter{font-size:0.75rem;color:var(--muted);white-space:nowrap;}
.counter strong{color:var(--text);}

/* PROGRESS */
.prog-wrap{flex:0 0 auto;padding:0 16px 6px;}
.prog-bar{height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--c-green));border-radius:99px;transition:width .4s ease;}

/* THEME TABS */
.tabs{
  flex:0 0 auto;
  display:flex;
  gap:6px;
  padding:0 16px 6px;
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex:0 0 auto;
  font-size:0.7rem;
  font-weight:500;
  padding:5px 12px;
  border-radius:99px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* CARD SCENE */
.scene{
  flex:1 1 0;
  min-height:0;
  padding:0 16px;
  perspective:1200px;
  display:flex;
  align-items:stretch;
}
.card{
  width:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,.2,.2,1);
  cursor:pointer;
}
.card.flipped{transform:rotateY(180deg);}

.face{
  position:absolute;
  inset:0;
  border-radius:16px;
  border:1px solid var(--border);
  backface-visibility:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px 22px;
  text-align:center;
  gap:8px;
  overflow:hidden;
}
.front{background:var(--surface);}
.back{background:var(--surface2);transform:rotateY(180deg);}

.badge{
  font-size:0.65rem;
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding:3px 11px;
  border-radius:99px;
}
.badge-imaginer{background:rgba(124,106,247,.18);color:#a99df8;}
.badge-connaitre{background:rgba(68,217,160,.15);color:#44d9a0;}
.badge-comprendre{background:rgba(255,159,67,.15);color:#ffb865;}
.badge-oeuvres{background:rgba(255,92,92,.15);color:#ff7f7f;}

.card-word{
  font-family:'DM Serif Display',serif;
  font-size:clamp(1.3rem,5vw,2rem);
  color:var(--text);
  line-height:1.15;
}
.card-tap{font-size:0.68rem;color:var(--muted);}

.card-def{
  font-size:clamp(0.78rem,2.2vw,0.92rem);
  line-height:1.58;
  color:var(--text);
  max-width:500px;
}
.card-ex{
  font-size:0.74rem;
  color:var(--muted);
  font-style:italic;
  line-height:1.5;
  border-top:1px solid var(--border);
  padding-top:8px;
  width:100%;
}

.card-status{
  position:absolute;
  top:11px;right:13px;
  font-size:0.62rem;
  font-weight:600;
  padding:3px 9px;
  border-radius:99px;
}

/* DOTS */
.dots{
  flex:0 0 auto;
  display:flex;
  justify-content:center;
  gap:4px;
  padding:6px 16px 2px;
  flex-wrap:wrap;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .25s;}
.dot.cur{background:var(--accent);width:18px;border-radius:99px;}
.dot.s0{background:var(--c-red);}
.dot.s1{background:var(--c-orange);}
.dot.s2{background:var(--c-blue);}
.dot.s3{background:var(--c-green);}

/* ACTION BUTTONS */
.actions{
  flex:0 0 auto;
  padding:6px 12px 8px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:6px;
}
.act-btn{
  border:none;
  border-radius:12px;
  padding:9px 4px;
  font-family:'DM Sans',sans-serif;
  font-size:0.7rem;
  font-weight:600;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  transition:transform .15s,opacity .15s;
  line-height:1.2;
}
.act-btn:active{transform:scale(.94);}
.act-btn .icon{font-size:1rem;}
.act-btn .sub{font-size:0.58rem;font-weight:400;opacity:.7;}

.btn-nope{background:var(--c-red-bg);color:var(--c-red);}
.btn-meh{background:var(--c-orange-bg);color:var(--c-orange);}
.btn-ok{background:var(--c-blue-bg);color:var(--c-blue);}
.btn-yes{background:var(--c-green-bg);color:var(--c-green);}

/* STATS */
.statsrow{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  padding:0 12px 8px;
}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  text-align:center;
  padding:5px 4px;
}
.stat-n{font-size:1rem;font-weight:600;color:var(--text);}
.stat-l{font-size:0.58rem;color:var(--muted);margin-top:1px;}
.stat-n.s0{color:var(--c-red);}
.stat-n.s1{color:var(--c-orange);}
.stat-n.s2{color:var(--c-blue);}
.stat-n.s3{color:var(--c-green);}

/* RESET */
.reset-row{flex:0 0 auto;text-align:center;padding:0 0 8px;}
.reset-btn{
  background:none;border:none;
  font-size:0.68rem;color:var(--muted);
  cursor:pointer;text-decoration:underline;
  font-family:'DM Sans',sans-serif;
}
.reset-btn:hover{color:var(--text);}

/* KEYBOARD HINT */
.kbd-hint{
  flex:0 0 auto;
  text-align:center;
  font-size:0.6rem;
  color:var(--muted);
  padding:0 0 6px;
  opacity:.6;
}

/* TOAST */
.toast{
  position:fixed;bottom:70px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:0.76rem;
  padding:7px 16px;border-radius:99px;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* MOBILE SQUEEZE */
@media(max-height:700px){
  .topbar{padding:8px 16px 4px;}
  .prog-wrap{padding:0 16px 4px;}
  .tabs{padding:0 16px 4px;}
  .dots{padding:4px 16px 0;}
  .actions{padding:4px 12px 4px;}
  .statsrow{padding:0 12px 4px;}
  .reset-row{padding:0 0 4px;}
  .kbd-hint{display:none;}
  .act-btn{padding:7px 3px;}
}
@media(max-width:400px){
  .act-btn .sub{display:none;}
  .act-btn{padding:9px 2px;}
  .card-word{font-size:1.2rem;}
}
</style>
</head>
<body>

<div class="topbar">

  </button>
  <button class="act-btn btn-ok" id="btn2">
    <span class="icon">✓</span><span>Acquis</span><span class="sub">dans 15–22</span>
  </button>

<div class="statsrow">

  <div class="stat"><div class="stat-n s3" id="sn3">0</div><div class="stat-l">Je sais</div></div>
</div>

<div class="reset-row">
  <button class="reset-btn" id="resetBtn">↺ Réinitialiser la session</button>
</div>

<div class="kbd-hint">Espace = retourner &nbsp;·&nbsp; 1 2 3 4 = noter</div>

<div class="toast" id="toast"></div>

<script>
const DATA=[
  {t:"imaginer",w:"Anthropomorphisme",d:"Tendance à attribuer des caractéristiques humaines (sentiments, pensées, comportements) à des animaux ou des êtres non humains.",ex:"Ex. : les animaux parlants dans les fables de La Fontaine."},
  {t:"imaginer",w:"Déshumanisation",d:"Processus par lequel un être humain est privé de ses caractéristiques humaines, souvent par assimilation à l'animal.",ex:"Ex. : dans les dystopies totalitaires."},
  {t:"imaginer",w:"Chimère",d:"Animal imaginaire et hybride, issu du croisement de plusieurs espèces réelles ou fantastiques.",ex:"Ex. : lion, chèvre et serpent dans la mythologie grecque."},
  {t:"imaginer",w:"Bestiaire",d:"Recueil médiéval de fables, textes et images sur les animaux, réels ou imaginaires. Désigne aussi l'ensemble des animaux présents dans une œuvre d'art.",ex:""},
  {t:"imaginer",w:"Hybride",d:"Animal issu du croisement de deux espèces différentes, ou être mi-humain mi-animal dans les récits fantastiques.",ex:"Ex. : le loup-garou."},
  {t:"imaginer",w:"Zodiaque",d:"Littéralement « le cercle des animaux » : ceinture céleste divisée en 12 signes, la plupart représentés par des animaux.",ex:""},
  {t:"imaginer",w:"Fable",d:"Court récit fictif, souvent mettant en scène des animaux, qui se termine par une morale à portée universelle.",ex:"Ex. : « Le Loup et le Chien » de La Fontaine."},
  {t:"imaginer",w:"Conte",d:"Récit imaginaire destiné à distraire, qui met souvent en scène des animaux, des créatures magiques ou des héros.",ex:"Ex. : Le Livre de la Jungle."},
  {t:"imaginer",w:"Légende",d:"Récit imaginaire traditionnel et populaire transmis oralement, ancré dans une culture ou un territoire.",ex:""},
  {t:"imaginer",w:"Mythe",d:"Récit fabuleux mettant en scène dieux, héros ou animaux symbolisant des forces et des aspects de la condition humaine. Réponse narrative aux grands questionnements du monde.",ex:"Ex. : Les Métamorphoses d'Ovide."},
  {t:"imaginer",w:"Métempsychose",d:"Doctrine philosophique et religieuse selon laquelle une même âme peut successivement animer plusieurs corps humains ou animaux (réincarnation).",ex:"Ex. : Pythagore (VIe s. av. J.-C.), Platon (IVe s.), animaux sacrés en Inde."},
  {t:"connaitre",w:"Animal",d:"Être vivant organisé, doué de sensibilité et capable (en général) de se mouvoir. Se distingue du végétal par sa motricité et sa sensibilité.",ex:""},
  {t:"connaitre",w:"Carnivore",d:"Animal qui se nourrit principalement ou exclusivement de chair animale.",ex:"Ex. : lion, requin, faucon."},
  {t:"connaitre",w:"Herbivore",d:"Animal qui se nourrit exclusivement de végétaux (herbes, feuilles, fruits).",ex:"Ex. : vache, lapin, éléphant."},
  {t:"connaitre",w:"Omnivore",d:"Animal qui se nourrit à la fois de végétaux et de chair animale.",ex:"Ex. : cochon, ours, être humain."},
  {t:"connaitre",w:"Prédateur",d:"Animal qui chasse et tue d'autres animaux (ses proies) pour se nourrir.",ex:"Ex. : loup, aigle, orque."},
  {t:"connaitre",w:"Parasite",d:"Organisme vivant aux dépens d'un hôte, dont il tire ses ressources sans le tuer immédiatement.",ex:"Ex. : puce, ténia, gui."},
  {t:"connaitre",w:"Nuisible",d:"Terme désignant un animal jugé néfaste pour les activités humaines (agriculture, élevage), notion relative et souvent contestée.",ex:"Ex. : taupe, renard (selon les contextes)."},
  {t:"connaitre",w:"Sauvage",d:"Qualifie un animal vivant à l'état naturel, non domestiqué, sans dépendance à l'homme.",ex:""},
  {t:"connaitre",w:"Fauve",d:"Grand mammifère carnivore, souvent de couleur fauve (brun-roux), considéré comme dangereux.",ex:"Ex. : lion, tigre, léopard."},
  {t:"connaitre",w:"Gibier",d:"Animal sauvage chassé pour sa chair. Terme lié aux pratiques de chasse.",ex:"Ex. : cerf, sanglier, faisan."},
  {t:"connaitre",w:"Race",d:"Subdivision d'une espèce animale domestique résultant de sélections humaines sur plusieurs générations.",ex:"Ex. : border collie, vache holstein."},
  {t:"connaitre",w:"Félin",d:"Mammifère carnivore de la famille des Félidés, aux griffes rétractiles et au corps souple.",ex:"Ex. : chat, lion, guépard."},
  {t:"connaitre",w:"Mammifère",d:"Animal vertébré à sang chaud, dont les femelles allaitent leurs petits avec du lait produit par des glandes mammaires.",ex:"Ex. : baleine, chauve-souris, homme."},
  {t:"connaitre",w:"Ovipare",d:"Animal qui se reproduit en pondant des œufs, dans lesquels le développement de l'embryon s'effectue à l'extérieur du corps maternel.",ex:"Ex. : poule, tortue, requin."},
  {t:"connaitre",w:"Taxonomie",d:"Science des lois et des principes de classification des organismes vivants. Permet de les organiser en groupes hiérarchiques.",ex:"Ex. : règne → embranchement → classe → ordre → famille → genre → espèce."},
  {t:"connaitre",w:"Zoologie",d:"Branche des sciences naturelles consacrée à l'étude des animaux (anatomie, comportement, évolution, classification).",ex:""},
  {t:"connaitre",w:"Extinction",d:"Disparition totale et irréversible d'une espèce vivante sur Terre.",ex:"Ex. : dodo, mammouth, dinosaures."},
  {t:"connaitre",w:"Éthique",d:"Ensemble des règles morales qui régissent les comportements envers l'Autre, y compris les animaux.",ex:"Ex. : éthique animale, droits des animaux."},
  {t:"comprendre",w:"Domestication",d:"Processus par lequel des animaux sauvages sont apprivoisés et élevés par l'être humain sur plusieurs générations, transformant leur comportement et leur biologie.",ex:"Ex. : chien (issu du loup), cheval, poule."},
  {t:"comprendre",w:"Empathie",d:"Capacité à ressentir et comprendre les émotions d'un autre être (humain ou animal), à se mettre à sa place.",ex:"Ex. : enjeu central du rapport humain-animal."},
  {t:"comprendre",w:"Éthologue",d:"Scientifique spécialisé dans l'étude du comportement des animaux dans leur environnement naturel ou en milieu fermé.",ex:"Ex. : Jane Goodall et ses recherches sur les chimpanzés."},
  {t:"comprendre",w:"Spécisme",d:"Idéologie postulant une hiérarchie entre les espèces, en particulier la supériorité de l'Homme sur l'animal, autorisant leur exploitation.",ex:"Terme apparu dans les années 1970."},
  {t:"comprendre",w:"Antispécisme",d:"Courant philosophique des années 1970 qui s'oppose au spécisme. Il accorde une considération morale à tous les êtres vivants.",ex:""},
  {t:"comprendre",w:"Végétarisme",d:"Régime alimentaire excluant la chair animale (viande, poisson), parfois étendu aux autres produits d'origine animale.",ex:""},
  {t:"comprendre",w:"Véganisme",d:"Mode de vie et régime alimentaire excluant tout produit d'origine animale (alimentation, vêtements, cosmétiques…).",ex:""},
  {t:"comprendre",w:"Zoothérapie",d:"Méthode thérapeutique ou de soutien psychologique qui utilise la relation avec des animaux pour améliorer le bien-être humain.",ex:"Ex. : médiation animale avec des chiens, chevaux, dauphins."},
  {t:"comprendre",w:"Animisme",d:"Croyance selon laquelle tout élément de la nature (animaux, plantes, minéraux) possède une âme. (Edward B. Tylor, 1871)",ex:""},
  {t:"comprendre",w:"Impur",d:"Qualifie un animal dont le contact est prohibé par conviction religieuse.",ex:"Ex. : le porc pour les musulmans et juifs, la vache pour certains hindous."},
  {t:"comprendre",w:"Ménagerie",d:"Lieu où sont rassemblés et exposés des animaux exotiques ou sauvages, ancêtre des zoos modernes.",ex:"Ex. : Ménagerie du Jardin des Plantes, Paris."},
  {t:"oeuvres",w:"La Ferme des animaux",d:"Roman de George Orwell, dystopie allégorique où des animaux renversent les humains et instaurent un régime totalitaire. Critique du stalinisme.",ex:"Personnages : Napoléon (cochon), Boule de Neige, Doublevoix."},
  {t:"oeuvres",w:"Le Règne animal",d:"Film de Thomas Caillet (2023), dystopie française dans laquelle des humains se transforment progressivement en animaux. Interroge l'identité et l'humanité.",ex:"César du meilleur film 2024."},
  {t:"oeuvres",w:"La Féline",d:"Film de Jacques Tourneur (1942). Une femme croit se transformer en panthère. Dystopie/fantastique questionnant la frontière homme-animal.",ex:"Film noir américain classique."},
  {t:"oeuvres",w:"Les Fables — La Fontaine",d:"Recueil de poèmes narratifs (XVIIe s.) où des animaux incarnent des types humains pour délivrer une morale. Inspiré d'Ésope et Phèdre.",ex:"Étudiée : « Le Loup et le Chien » (liberté vs servitude)."},
  {t:"oeuvres",w:"Le Livre de la Jungle",d:"Roman de Rudyard Kipling (1894) relatant l'enfance de Mowgli parmi les animaux de la jungle. Réflexion sur l'appartenance et l'identité.",ex:"Adapté par Walt Disney (1967)."},
  {t:"oeuvres",w:"Les Métamorphoses — Ovide",d:"Recueil de récits poétiques latins (Ier s.) narrant des transformations d'humains en animaux, punitions divines liées à la désobéissance.",ex:"Ex. : Actéon changé en cerf, Io en génisse."},
  {t:"oeuvres",w:"Des fleurs pour Algernon",d:"Roman de Daniel Keyes : Charlie, déficient mental, est soumis à une expérience scientifique ayant déjà transformé Algernon (la souris). Questionne l'intelligence et l'humanité.",ex:"Dystopie scientifique."},
  {t:"oeuvres",w:"Mélancolie — Victor Hugo",d:"Poème de Victor Hugo dénonçant la maltraitance d'un cheval de trait (limonier), symbole de l'exploitation animale par les hommes.",ex:"Appartient aux Contemplations."},
  {t:"oeuvres",w:"Microcosmos",d:"Film documentaire de Marie Pérennou (1996) filmant au plus près les insectes et petites bêtes. Multi-récompensé, grand succès en salle.",ex:"Précurseur du documentaire animalier immersif."},
  {t:"oeuvres",w:"Le Peuple migrateur",d:"Film documentaire de Jacques Perrin (2001) consacré aux oiseaux migrateurs, filmés en vol. Grand succès populaire.",ex:""},
];

const THEMES=[
  {id:"all",label:"Tout"},
  {id:"imaginer",label:"I. Imaginer"},
  {id:"connaitre",label:"II. Connaître"},
  {id:"comprendre",label:"III. Comprendre"},
  {id:"oeuvres",label:"Œuvres"},
];

const BADGECLS={imaginer:"badge-imaginer",connaitre:"badge-connaitre",comprendre:"badge-comprendre",oeuvres:"badge-oeuvres"};
const THEMELABEL={imaginer:"I. Imaginer",connaitre:"II. Connaître",comprendre:"III. Comprendre",oeuvres:"Œuvres"};
const SM=[
  {label:"Pas acquis",bg:"rgba(255,92,92,.2)",color:"#ff5c5c",range:[3,5]},
  {label:"En cours",bg:"rgba(255,159,67,.2)",color:"#ff9f43",range:[5,10]},
  {label:"Acquis",bg:"rgba(91,181,255,.2)",color:"#5bb5ff",range:[15,22]},
  {label:"Je sais",bg:"rgba(68,217,160,.2)",color:"#44d9a0",range:[30,35]},
];

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=rand(0,i);[r[i],r[j]]=[r[j],r[i]];}return r;}

let theme="all";
let queue=[];
let cursor=0;
let status={};
let flipped=false;

function baseCards(){return theme==="all"?DATA:DATA.filter(d=>d.t===theme);}
function initQueue(){
  const base=baseCards();
  queue=shuffle(base.map(d=>DATA.indexOf(d)));
  cursor=0;flipped=false;
}
function cur(){return DATA[queue[cursor]];}

function setTheme(id){
  theme=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.id===id));
  status={};initQueue();render();
}

function applyScore(level){
  const card=cur();
  status[card.w]=level;
  const dist=rand(...SM[level].range);
  const insertAt=Math.min(cursor+dist,queue.length);
  // remove earlier scheduled reinsert of same card
  for(let i=cursor+1;i<queue.length;i++){if(queue[i]===queue[cursor]){queue.splice(i,1);break;}}
  if(level<3) queue.splice(insertAt,0,queue[cursor]);
  cursor++;
  if(cursor>=queue.length){
    const unmastered=queue.slice(0,cursor).filter(i=>(status[DATA[i].w]??-1)<3);
    if(unmastered.length>0){
      queue=[...queue,...shuffle(unmastered)];
      showToast("Session terminée ! Révision des cartes non maîtrisées.");
    } else {
      showToast("🎉 Toutes les cartes sont maîtrisées !");
      cursor=queue.length-1;
    }
  }
  flipped=false;render();
}

function render(){
  const card=cur();
  const s=status[card.w]??-1;
  const tl=THEMELABEL[card.t];
  const bc=BADGECLS[card.t];

  ["bFront","bBack"].forEach(id=>{const el=document.getElementById(id);el.className="badge "+bc;el.textContent=tl;});
  document.getElementById("fWord").textContent=card.w;
  document.getElementById("bDef").textContent=card.d;
  const exEl=document.getElementById("bEx");
  exEl.textContent=card.ex||"";
  exEl.style.display=card.ex?"":"none";

  ["sfFront","sfBack"].forEach(id=>{
    const el=document.getElementById(id);
    if(s>=0){const m=SM[s];el.textContent=m.label;el.style.cssText=`background:${m.bg};color:${m.color};font-size:.6rem;font-weight:600;padding:3px 9px;border-radius:99px;`;}
    else{el.textContent="";el.style.cssText="";}
  });

  document.getElementById("card").classList.toggle("flipped",flipped);

  const total=queue.length;
  document.getElementById("cntCur").textContent=Math.min(cursor+1,total);
  document.getElementById("cntTot").textContent=total;

  const mastered=Object.values(status).filter(v=>v===3).length;
  const base=baseCards();
  const pct=base.length>0?Math.round(mastered/base.length*100):0;
  document.getElementById("progFill").style.width=pct+"%";

  // dots
  const dotsEl=document.getElementById("dots");
  const vis=Math.min(queue.length,30);
  let html="";
  for(let i=0;i<vis;i++){
    const qi=Math.floor(i*queue.length/vis);
    const w=DATA[queue[qi]]?.w;
    const sv=w&&w in status?status[w]:-1;
    const isCur=qi===cursor;
    const cls=isCur?"dot cur":(sv>=0?"dot s"+sv:"dot");
    html+=`<div class="${cls}"></div>`;
  }
  dotsEl.innerHTML=html;

  const counts=[0,0,0,0];
  Object.values(status).forEach(v=>{if(v>=0&&v<=3)counts[v]++;});
  for(let i=0;i<4;i++) document.getElementById("sn"+i).textContent=counts[i];
}

// TABS
const tabsEl=document.getElementById("tabs");
THEMES.forEach(th=>{
  const b=document.createElement("button");
  b.className="tab"+(th.id===theme?" active":"");
  b.dataset.id=th.id;b.textContent=th.label;
  b.onclick=()=>setTheme(th.id);
  tabsEl.appendChild(b);
});

document.getElementById("card").addEventListener("click",()=>{flipped=!flipped;document.getElementById("card").classList.toggle("flipped",flipped);});

[0,1,2,3].forEach(i=>{document.getElementById("btn"+i).addEventListener("click",e=>{e.stopPropagation();applyScore(i);});});

document.getElementById("resetBtn").addEventListener("click",()=>{status={};initQueue();render();showToast("Session réinitialisée.");});

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

document.addEventListener("keydown",e=>{
  if(e.key===" "){e.preventDefault();document.getElementById("card").click();}
  else if(e.key==="1")applyScore(0);
  else if(e.key==="2")applyScore(1);
  else if(e.key==="3")applyScore(2);
  else if(e.key==="4")applyScore(3);
});

initQueue();render();
</script>
</body>
</html>
